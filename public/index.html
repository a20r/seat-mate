<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#131810" />
    <title>SeatMate — seating matchmaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Join -->
    <section id="view-join" class="view">
      <div class="join-card">
        <div class="logo">🪑🤍</div>
        <h1>SeatMate</h1>
        <p class="tagline">Swipe to design the seating chart. Right if they'd click at the table, left if not.</p>
        <input id="nameInput" type="text" placeholder="Your name" autocomplete="name" maxlength="40" />
        <button id="joinBtn" class="primary">Start swiping</button>
        <button id="resultsLinkBtn" class="ghost">See the seating chart →</button>
      </div>
    </section>

    <!-- Swipe -->
    <section id="view-swipe" class="view hidden">
      <header class="topbar">
        <button id="backToJoin" class="icon-btn" aria-label="Home">‹</button>
        <div class="ego-line">Who sits beside<br /><strong id="egoName">—</strong></div>
        <button id="endBtn" class="end-btn">End</button>
      </header>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="progressText" class="progress-text"></div>

      <div id="deck" class="deck">
        <!-- card injected here -->
      </div>

      <div class="actions">
        <button id="nopeBtn" class="action nope" aria-label="Bad match">✕</button>
        <button id="togetherBtn" class="action together" aria-label="Seat together">⌃</button>
        <button id="likeBtn" class="action like" aria-label="Good match">♥</button>
      </div>
      <div class="hint">Swipe ← / → to rate · swipe ↑ to seat someone with <span id="hintEgo">them</span></div>
    </section>

    <!-- Seat-together sheet -->
    <section id="seatSheet" class="sheet hidden">
      <div class="sheet-scrim"></div>
      <div class="sheet-card">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Seat with <em id="sheetEgo">—</em></div>
        <p class="sheet-sub">Search any guest and tap to pin them to this person.</p>

        <div class="seg" id="sheetMode">
          <button class="seg-opt active" data-mode="adjacent">
            <span class="seg-emoji">💍</span>
            <span class="seg-lab">Right beside</span>
            <span class="seg-cap">couples</span>
          </button>
          <button class="seg-opt" data-mode="group">
            <span class="seg-emoji">👪</span>
            <span class="seg-lab">Same table</span>
            <span class="seg-cap">families</span>
          </button>
        </div>

        <input id="sheetSearch" type="text" placeholder="Search guests…" autocomplete="off" />
        <div id="guestList" class="guest-list"></div>

        <div class="sheet-actions">
          <button id="sheetDone" class="sheet-btn done-btn">Done</button>
        </div>
      </div>
    </section>

    <!-- Results -->
    <section id="view-results" class="view hidden">
      <header class="topbar">
        <button id="backToSwipe" class="icon-btn" aria-label="Back">‹</button>
        <div class="ego-line"><strong>Seating Chart</strong></div>
        <button id="refreshResults" class="end-btn">↻</button>
      </header>
      <div id="resultsBody" class="results-body">
        <p class="muted">Loading…</p>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
