<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1f2421" />
    <title>SeatMate — long-table matchmaker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Join -->
    <section id="view-join" class="view">
      <div class="join-card">
        <div class="logo">🪑💚</div>
        <h1>SeatMate</h1>
        <p class="tagline">Swipe to design the long table. Right if they'd be great neighbors, left if not.</p>
        <input id="nameInput" type="text" placeholder="Your name" autocomplete="name" maxlength="40" />
        <button id="joinBtn" class="primary">Start swiping</button>
        <button id="resultsLinkBtn" class="ghost">See the affinities →</button>
      </div>
    </section>

    <!-- Swipe -->
    <section id="view-swipe" class="view hidden">
      <header class="topbar">
        <button id="backToJoin" class="icon-btn" aria-label="Home">‹</button>
        <div class="ego-line">Who should sit next to<br /><strong id="egoName">—</strong>?</div>
        <button id="endBtn" class="end-btn">End</button>
      </header>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="progressText" class="progress-text"></div>

      <div id="deck" class="deck">
        <!-- card injected here -->
      </div>

      <div class="actions">
        <button id="nopeBtn" class="action nope" aria-label="Bad neighbors">✕</button>
        <button id="likeBtn" class="action like" aria-label="Good neighbors">♥</button>
      </div>
      <div class="hint">Drag the card or tap the buttons</div>
    </section>

    <!-- Results -->
    <section id="view-results" class="view hidden">
      <header class="topbar">
        <button id="backToSwipe" class="icon-btn" aria-label="Back">‹</button>
        <div class="ego-line"><strong>The Affinities</strong></div>
        <button id="refreshResults" class="end-btn">↻</button>
      </header>
      <div id="resultsBody" class="results-body">
        <p class="muted">Loading…</p>
      </div>
    </section>

    <!-- Floating feedback button -->
    <button id="feedbackFab" class="feedback-fab" aria-label="Send feedback">
      <span class="feedback-fab-icon" aria-hidden="true">💬</span>
      <span class="feedback-fab-label">Feedback</span>
    </button>

    <!-- Feedback modal -->
    <div id="feedbackModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="feedbackHeading">
      <div class="modal-scrim" data-close></div>
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="feedbackHeading">Send feedback</h2>
          <button class="modal-close" data-close aria-label="Close">✕</button>
        </div>
        <p class="modal-sub">Spotted a bug or have an idea? Submitting opens a pre-filled GitHub issue in a new tab.</p>

        <label class="modal-label" for="feedbackTitle">Title</label>
        <input id="feedbackTitle" type="text" maxlength="120" />

        <label class="modal-label" for="feedbackBody">Details</label>
        <textarea id="feedbackBody" placeholder="What happened, or what would you like to see?"></textarea>

        <div class="modal-actions">
          <button class="modal-btn ghost-btn" data-close>Cancel</button>
          <button id="feedbackSubmit" class="modal-btn submit-btn">Open GitHub issue ↗</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
